<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <link
      rel="stylesheet"
      href="https://noterook.net/static/css/noterook.css"
    />
    <link rel="stylesheet" href="./editorInner.css" />
    <link rel="stylesheet" href="./themes.css" />
  </head>
  <body>
    <main>
      <header></header>
      <div class="composer-wrapper">
        <div class="tf-composer">
          <div id="editor-header" class="composer-header">
            <h2>Markdown</h2>
          </div>
          <div id="composer"></div>
        </div>
        <div class="tf-composer">
          <div class="composer-header">
            <h2>CSS</h2>
          </div>
          <div id="css-composer"></div>
        </div>
      </div>
      <footer class="tf-composer-controls">
        <input
          id="composer-tags"
          type="text"
          class="composer-tags-input"
          placeholder="Tags (comma-separated)"
          maxlength="500"
        />
        <div class="composer-options">
          <label class="composer-checkbox-label">
            <input type="checkbox" id="composer-hide-search" />
            Book only
          </label>
        </div>
        <div class="composer-buttons">
          <button
            type="button"
            id="composer-submit"
            class="btn-primary composer-btn"
          >
            Post
          </button>
          <div class="composer-char-count" id="composer-char-count">
            0 / 100,000
          </div>
        </div>
      </footer>
    </main>
    <aside id="tf-preview"></aside>
    <script src="../lib/marked.min.js"></script>
    <script src="../lib/purify.min.js"></script>
    <script src="../lib/culori.min.js"></script>
    <script src="../lib/src-min-noconflict/ace.js"></script>
    <script type="module" src="./editorConfig.js"></script>
  </body>
</html>
